<section class="users-page">
<div class="users-page-header">
<h1>Panel administracyjny użytkowników</h1>
<a routerLink="/users/create" class="btn btn-create">Dodaj użytkownika</a>
</div>

<form class="filters-panel" (ngSubmit)="applyFilters()">
<div class="filters-grid">
<div class="form-group">
<label for="search">Wyszukaj</label>
<input
id="search"
name="search"
type="text"
[(ngModel)]="filters.search"
placeholder="Imię, nazwisko lub email"
>
</div>

<div class="form-group">
<label for="status">Status</label>
<select
id="status"
name="status"
[(ngModel)]="filters.status"
>
<option value="">Wszystkie</option>
<option value="active">active</option>
<option value="blocked">blocked</option>
</select>
</div>

<div class="form-group">
<label for="role_id">Rola</label>
<select
id="role_id"
name="role_id"
[(ngModel)]="filters.role_id"
>
<option value="">Wszystkie</option>
<option *ngFor="let role of roles" [value]="role.id">
{{ role.name }}
</option>
</select>
</div>
</div>

<div class="filters-actions">
<button type="submit" class="btn btn-filter">Filtruj</button>
<button type="button" class="btn btn-reset" (click)="resetFilters()">Reset</button>
</div>
</form>

<p *ngIf="isLoading">Ładowanie użytkowników...</p>
<p *ngIf="errorMessage">{{ errorMessage }}</p>

<app-users-list
*ngIf="!isLoading && !errorMessage"
[users]="users"
(delete)="deleteUser($event)">
</app-users-list>
</section>
