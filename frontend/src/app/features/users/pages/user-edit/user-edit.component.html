<section class="user-edit-page">
<h1>Edytuj użytkownika</h1>

<p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>
<p *ngIf="isLoading">Ładowanie...</p>

<form *ngIf="!isLoading" (ngSubmit)="submit()" #userForm="ngForm" class="user-form">
<div class="form-group">
<label for="first_name">Imię</label>
<input
id="first_name"
name="first_name"
type="text"
[(ngModel)]="form.first_name"
#firstNameModel="ngModel"
required
>
<p class="field-error" *ngIf="firstNameModel.invalid && firstNameModel.touched">
Imię jest wymagane.
</p>
</div>

<div class="form-group">
<label for="last_name">Nazwisko</label>
<input
id="last_name"
name="last_name"
type="text"
[(ngModel)]="form.last_name"
#lastNameModel="ngModel"
required
>
<p class="field-error" *ngIf="lastNameModel.invalid && lastNameModel.touched">
Nazwisko jest wymagane.
</p>
</div>

<div class="form-group">
<label for="email">Email</label>
<input
id="email"
name="email"
type="email"
[(ngModel)]="form.email"
#emailModel="ngModel"
required
email
>
<p class="field-error" *ngIf="emailModel.errors?.['required'] && emailModel.touched">
Email jest wymagany.
</p>
<p class="field-error" *ngIf="emailModel.errors?.['email'] && emailModel.touched">
Podaj poprawny adres email.
</p>
</div>

<div class="form-group">
<label for="status">Status</label>
<select
id="status"
name="status"
[(ngModel)]="form.status"
#statusModel="ngModel"
required
>
<option value="active">active</option>
<option value="blocked">blocked</option>
</select>
<p class="field-error" *ngIf="statusModel.invalid && statusModel.touched">
Status jest wymagany.
</p>
</div>

<div class="form-group">
<label for="role_id">Rola</label>
<select
id="role_id"
name="role_id"
[(ngModel)]="form.role_id"
#roleModel="ngModel"
required
>
<option *ngFor="let role of roles" [ngValue]="role.id">
{{ role.name }}
</option>
</select>
<p class="field-error" *ngIf="roleModel.invalid && roleModel.touched">
Rola jest wymagana.
</p>
</div>

<div class="actions">
<button type="submit" [disabled]="isLoading || userForm.invalid">
Zapisz zmiany
</button>

<a routerLink="/users">Powrót do listy</a>
</div>
</form>
</section>
